version: '3.8'

services:
  php-calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lr10_calculator
    ports:
      - "8080:80"
    volumes:
      - ./php-app:/var/www/html
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped
